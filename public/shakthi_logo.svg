<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="500" height="300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cc0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#990000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="plateGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f0f0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#00000044"/>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect x="10" y="10" width="480" height="280" rx="20" ry="20" fill="url(#bgGrad)"/>

  <!-- Gold border -->
  <rect x="18" y="18" width="464" height="264" rx="15" ry="15" fill="none" stroke="#FFD700" stroke-width="2.5"/>

  <!-- === FOOD ILLUSTRATION === -->
  <!-- Banana leaf / plate base -->
  <ellipse cx="250" cy="165" rx="72" ry="12" fill="#228B22" opacity="0.85"/>

  <!-- Plate -->
  <ellipse cx="250" cy="160" rx="68" ry="10" fill="#4CAF50" opacity="0.7"/>
  <ellipse cx="250" cy="157" rx="62" ry="9" fill="url(#plateGrad)" filter="url(#shadow)"/>

  <!-- Rice mound -->
  <ellipse cx="250" cy="148" rx="30" ry="12" fill="#fffde7"/>
  <ellipse cx="250" cy="142" rx="22" ry="8" fill="#fff9c4"/>

  <!-- Sambar bowl -->
  <ellipse cx="205" cy="155" rx="16" ry="7" fill="#8B4513"/>
  <ellipse cx="205" cy="150" rx="14" ry="6" fill="#c0392b"/>
  <!-- steam -->
  <path d="M202 144 Q203 138 202 132" stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.5" stroke-linecap="round"/>
  <path d="M206 143 Q207 137 206 131" stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.5" stroke-linecap="round"/>

  <!-- Chutney -->
  <ellipse cx="295" cy="155" rx="14" ry="6" fill="#2e7d32"/>
  <ellipse cx="295" cy="150" rx="12" ry="5" fill="#43a047"/>

  <!-- Vada / Idli on plate -->
  <ellipse cx="238" cy="153" rx="11" ry="5" fill="#f5deb3"/>
  <ellipse cx="238" cy="150" rx="9" ry="4" fill="#ffe0b2"/>
  <ellipse cx="262" cy="153" rx="11" ry="5" fill="#f5deb3"/>
  <ellipse cx="262" cy="150" rx="9" ry="4" fill="#ffe0b2"/>

  <!-- Spoon -->
  <line x1="320" y1="175" x2="340" y2="145" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="340" cy="143" rx="6" ry="4" fill="#FFD700"/>

  <!-- === TEXT === -->
  <!-- Main shop name -->
  <text x="250" y="58" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="bold"
        fill="#FFD700" text-anchor="middle" letter-spacing="2"
        filter="url(#shadow)">SHAKTHI</text>

  <!-- Subtitle -->
  <text x="250" y="88" font-family="Georgia, 'Times New Roman', serif" font-size="18"
        fill="#ffffff" text-anchor="middle" letter-spacing="3">THATTUVADA</text>

  <!-- Decorative line -->
  <line x1="100" y1="97" x2="400" y2="97" stroke="#FFD700" stroke-width="1.5" opacity="0.7"/>
  <polygon points="250,93 255,101 245,101" fill="#FFD700"/>

  <!-- Bottom tagline -->
  <text x="250" y="248" font-family="Georgia, 'Times New Roman', serif" font-size="15"
        fill="#FFD700" text-anchor="middle" letter-spacing="4">SET CORNER</text>

  <!-- Small decorative dots -->
  <circle cx="140" cy="248" r="3" fill="#FFD700" opacity="0.7"/>
  <circle cx="155" cy="248" r="2" fill="#FFD700" opacity="0.5"/>
  <circle cx="360" cy="248" r="3" fill="#FFD700" opacity="0.7"/>
  <circle cx="345" cy="248" r="2" fill="#FFD700" opacity="0.5"/>

  <!-- Star decorations -->
  <text x="80" y="62" font-size="18" fill="#FFD700" opacity="0.6">✦</text>
  <text x="408" y="62" font-size="18" fill="#FFD700" opacity="0.6">✦</text>
</svg>
